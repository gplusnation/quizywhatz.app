<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏆 Leaderboard - Quiz Edukasi</title>
<style>
  :root {
    --bg-primary: #f0f2f5; --bg-secondary: #ffffff;
    --text-primary: #111b21; --text-secondary: #667781;
    --accent: #00a884; --border: #e9edef;
    --shadow: rgba(0,0,0,0.1);
  }
  [data-theme="dark"] {
    --bg-primary: #111b21; --bg-secondary: #202c33;
    --text-primary: #e9edef; --text-secondary: #8696a0;
    --accent: #00a884; --border: #2a3942;
    --shadow: rgba(0,0,0,0.5);
  }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --bg-primary: #111b21; --bg-secondary: #202c33;
      --text-primary: #e9edef; --text-secondary: #8696a0;
      --accent: #00a884; --border: #2a3942;
      --shadow: rgba(0,0,0,0.5);
    }
  }
  * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',sans-serif; }
  body { background:var(--bg-primary); color:var(--text-primary); min-height:100vh; padding:20px; }
  .container { max-width:700px; margin:0 auto; }
  h1 { text-align:center; color:var(--accent); margin-bottom:8px; font-size:28px; }
  .subtitle { text-align:center; color:var(--text-secondary); margin-bottom:20px; font-size:14px; }
  .filters { display:flex; gap:8px; justify-content:center; margin-bottom:20px; flex-wrap:wrap; }
  .filter-btn { 
    background:var(--bg-secondary); color:var(--text-primary); 
    border:1px solid var(--border); padding:8px 16px; 
    border-radius:20px; cursor:pointer; font-size:13px;
  }
  .filter-btn.active { background:var(--accent); color:white; border-color:var(--accent); }
  .loading, .empty { text-align:center; padding:40px; color:var(--text-secondary); }
  table { 
    width:100%; border-collapse:collapse; 
    background:var(--bg-secondary); border-radius:12px; overflow:hidden;
    box-shadow:0 2px 8px var(--shadow);
  }
  th { background:var(--accent); padding:12px; text-align:left; font-size:13px; color:white; }
  td { padding:10px 12px; border-bottom:1px solid var(--border); font-size:13px; color:var(--text-primary); }
  tr:last-child td { border-bottom:none; }
  tr:hover td { background:var(--bg-primary); }
  .rank { font-weight:bold; font-size:16px; }
  .rank-1 { color:#ffd700; }
  .rank-2 { color:#c0c0c0; }
  .rank-3 { color:#cd7f32; }
  .score-cell { font-weight:bold; color:var(--accent); }
  .time-cell { 
    font-family:'Courier New',monospace; 
    color:var(--text-secondary);
    font-size:12px;
  }
  .back-btn { 
    display:block; text-align:center; margin:20px auto; 
    background:var(--accent); color:white; padding:12px 24px; 
    border-radius:20px; text-decoration:none; font-weight:bold;
  }
  .theme-toggle {
    position:fixed; top:20px; right:20px;
    background:var(--bg-secondary); border:1px solid var(--border);
    border-radius:50%; width:44px; height:44px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; box-shadow:0 2px 8px var(--shadow);
  }
  .info-box {
    background:var(--bg-secondary);
    border-left:4px solid var(--accent);
    padding:10px 14px;
    border-radius:6px;
    margin-bottom:16px;
    font-size:13px;
    color:var(--text-secondary);
  }
</style>
</head>
<body>
<button class="theme-toggle" id="themeToggle" title="Toggle Theme">
  <svg id="themeIcon" viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
    <path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58a.996.996 0 00-1.41 0 .996.996 0 000 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37a.996.996 0 00-1.41 0 .996.996 0 000 1.41l1.06 1.06c.39.39 1.03.39 1.41 0a.996.996 0 000-1.41l-1.06-1.06zm1.06-10.96a.996.996 0 000-1.41.996.996 0 00-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06zM7.05 18.36a.996.996 0 000-1.41.996.996 0 00-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06z"/>
  </svg>
</button>

<div class="container">
  <h1>🏆 Leaderboard</h1>
  <p class="subtitle">Peringkat peserta Quiz Edukasi</p>
  
  <div class="info-box">
    📊 <b>Peringkat ditentukan oleh:</b> Nilai tertinggi → Waktu tercepat
  </div>

  <div class="filters">
    <button class="filter-btn active" data-level="ALL">Semua</button>
    <button class="filter-btn" data-level="SD">SD</button>
    <button class="filter-btn" data-level="SMP">SMP</button>
  </div>

  <div id="content"><div class="loading">⏳ Memuat data...</div></div>

  <a href="index.html" class="back-btn">🏠 Main Lagi</a>
</div>

<script>
const WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbxWFxZjjPYg8p_xabiqpb4vVq-_playWK0b-XYCvrfo4gzNiAqestysp1-Zu5ba_1h_/exec';
let allData = [];
let currentLevel = 'ALL';

const themeToggle = document.getElementById('themeToggle');
const themeIcon = document.getElementById('themeIcon');

function getPreferredTheme() {
  const saved = localStorage.getItem('quizTheme');
  if (saved) return saved;
  return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
}
function setTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem('quizTheme', theme);
  updateThemeIcon(theme);
}
function updateThemeIcon(theme) {
  if (theme === 'dark') {
    themeIcon.innerHTML = '<path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 01-4.4 2.26 5.403 5.403 0 01-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"/>';
  } else {
    themeIcon.innerHTML = '<path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58a.996.996 0 00-1.41 0 .996.996 0 000 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37a.996.996 0 00-1.41 0 .996.996 0 000 1.41l1.06 1.06c.39.39 1.03.39 1.41 0a.996.996 0 000-1.41l-1.06-1.06zm1.06-10.96a.996.996 0 000-1.41.996.996 0 00-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06zM7.05 18.36a.996.996 0 000-1.41.996.996 0 00-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06z"/>';
  }
}
setTheme(getPreferredTheme());
themeToggle.addEventListener('click', () => {
  const current = document.documentElement.getAttribute('data-theme');
  setTheme(current === 'dark' ? 'light' : 'dark');
});

function fetchJSONP(url, cbName) {
  return new Promise((resolve, reject) => {
    const cb = cbName + '_' + Date.now();
    window[cb] = (data) => { resolve(data); delete window[cb]; script.remove(); };
    const script = document.createElement('script');
    script.src = url + (url.includes('?')?'&':'?') + 'callback=' + cb;
    script.onerror = () => { reject(); delete window[cb]; script.remove(); };
    document.body.appendChild(script);
  });
}

function formatTime(seconds) {
  if (!seconds && seconds !== 0) return '-';
  const s = parseInt(seconds);
  const m = Math.floor(s / 60).toString().padStart(2, '0');
  const sec = (s % 60).toString().padStart(2, '0');
  return `${m}:${sec}`;
}

async function loadLeaderboard() {
  try {
    const data = await fetchJSONP(`${WEBAPP_URL}?action=getLeaderboard`, 'getLB');
    allData = data.leaderboard || [];
    render();
  } catch (e) {
    document.getElementById('content').innerHTML = '<div class="empty">⚠️ Gagal memuat data</div>';
  }
}

function render() {
  const filtered = currentLevel === 'ALL' ? allData : allData.filter(d => d.level === currentLevel);
  
  // Sort: persen DESC, lalu waktu ASC (dalam detik)
  filtered.sort((a, b) => {
    if (b.persen !== a.persen) return b.persen - a.persen;
    const wa = parseInt(a.waktu) || 999999;
    const wb = parseInt(b.waktu) || 999999;
    return wa - wb;
  });

  if (filtered.length === 0) {
    document.getElementById('content').innerHTML = '<div class="empty">Belum ada data</div>';
    return;
  }

  let html = '<table><thead><tr><th>#</th><th>Nama</th><th>Sekolah</th><th>Level</th><th>Nilai</th><th>Waktu</th></tr></thead><tbody>';
  filtered.slice(0, 50).forEach((d, i) => {
    const rank = i + 1;
    const medal = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : rank;
    const rankClass = rank <= 3 ? `rank rank-${rank}` : 'rank';
    html += `<tr>
      <td class="${rankClass}">${medal}</td>
      <td>${escapeHtml(d.nama)}</td>
      <td>${escapeHtml(d.sekolah)}</td>
      <td>${d.level}</td>
      <td class="score-cell">${d.persen}%</td>
      <td class="time-cell">⏱️ ${formatTime(d.waktu)}</td>
    </tr>`;
  });
  html += '</tbody></table>';
  document.getElementById('content').innerHTML = html;
}

function escapeHtml(t) {
  const d = document.createElement('div');
  d.textContent = t;
  return d.innerHTML;
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentLevel = btn.dataset.level;
    render();
  };
});

loadLeaderboard();
</script>
</body>
</html>
