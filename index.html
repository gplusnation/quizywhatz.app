<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Edukasi - WhatsApp Style</title>
<style>
  :root {
    --bg-primary: #f0f2f5;
    --bg-secondary: #ffffff;
    --bg-chat: #efeae2;
    --bg-header: #f0f2f5;
    --bg-message-sent: #d9fdd3;
    --bg-message-received: #ffffff;
    --bg-input: #ffffff;
    --bg-quick-reply: #f0f2f5;
    --text-primary: #111b21;
    --text-secondary: #667781;
    --text-muted: #8696a0;
    --accent: #00a884;
    --accent-hover: #008069;
    --border-color: #e9edef;
    --shadow: rgba(0,0,0,0.1);
    --correct: #00a884;
    --wrong: #b33a3a;
    --skip: #f0b429;
    --timer-bg: #fff3cd;
    --timer-text: #856404;
  }

  [data-theme="dark"] {
    --bg-primary: #111b21;
    --bg-secondary: #202c33;
    --bg-chat: #0b141a;
    --bg-header: #202c33;
    --bg-message-sent: #005c4b;
    --bg-message-received: #202c33;
    --bg-input: #2a3942;
    --bg-quick-reply: #202c33;
    --text-primary: #e9edef;
    --text-secondary: #8696a0;
    --text-muted: #8696a0;
    --accent: #00a884;
    --accent-hover: #00c49a;
    --border-color: #2a3942;
    --shadow: rgba(0,0,0,0.5);
    --skip: #f0b429;
    --timer-bg: #3d3200;
    --timer-text: #ffd700;
  }

  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --bg-primary: #111b21;
      --bg-secondary: #202c33;
      --bg-chat: #0b141a;
      --bg-header: #202c33;
      --bg-message-sent: #005c4b;
      --bg-message-received: #202c33;
      --bg-input: #2a3942;
      --bg-quick-reply: #202c33;
      --text-primary: #e9edef;
      --text-secondary: #8696a0;
      --text-muted: #8696a0;
      --accent: #00a884;
      --accent-hover: #00c49a;
      --border-color: #2a3942;
      --shadow: rgba(0,0,0,0.5);
      --skip: #f0b429;
      --timer-bg: #3d3200;
      --timer-text: #ffd700;
    }
  }

  * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',Tahoma,sans-serif; }
  
  body { 
    background:var(--bg-primary); 
    display:flex; 
    justify-content:center; 
    align-items:center; 
    min-height:100vh;
    transition:background 0.3s ease;
  }
  
  .phone-frame { 
    width:100%; 
    max-width:420px; 
    height:100vh; 
    max-height:750px; 
    background:var(--bg-secondary); 
    border-radius:20px; 
    overflow:hidden; 
    box-shadow:0 20px 60px var(--shadow); 
    display:flex; 
    flex-direction:column;
    transition:background 0.3s ease;
  }
  @media(min-width:500px){ .phone-frame{height:750px;} }

  /* Header */
  .chat-header { 
    background:var(--bg-header); 
    padding:10px 16px; 
    display:flex; 
    align-items:center; 
    gap:12px; 
    min-height:60px;
    border-bottom:1px solid var(--border-color);
  }
  .avatar { 
    width:40px; height:40px; border-radius:50%; 
    background:linear-gradient(135deg,var(--accent),var(--accent-hover)); 
    display:flex; align-items:center; justify-content:center; 
    color:white; font-weight:bold; font-size:18px; 
  }
  .contact-info { flex:1; }
  .contact-name { color:var(--text-primary); font-size:16px; font-weight:500; }
  .contact-status { color:var(--text-secondary); font-size:12px; margin-top:1px; }
  .header-icons { color:var(--text-secondary); font-size:14px; display:flex; gap:12px; align-items:center; }
  .header-icons span { display:flex; align-items:center; gap:4px; }
  
  .theme-toggle {
    cursor:pointer; padding:4px; border-radius:50%;
    transition:background 0.2s;
  }
  .theme-toggle:hover { background:var(--bg-quick-reply); }

  /* Timer Badge */
  .timer-badge {
    background:var(--timer-bg);
    color:var(--timer-text);
    padding:4px 10px;
    border-radius:12px;
    font-size:13px;
    font-weight:bold;
    font-family:'Courier New',monospace;
    display:flex;
    align-items:center;
    gap:4px;
  }
  .timer-badge svg { width:14px; height:14px; }

  /* Progress Bar */
  .progress-bar { height:3px; background:var(--bg-quick-reply); width:100%; }
  .progress-fill { height:100%; background:var(--accent); width:0%; transition:width .4s ease; }

  /* Chat Area */
  .chat-area { 
    flex:1; 
    overflow-y:auto; 
    padding:16px; 
    background:var(--bg-chat); 
    display:flex; 
    flex-direction:column; 
    gap:4px;
  }
  .chat-area::-webkit-scrollbar { width:6px; }
  .chat-area::-webkit-scrollbar-thumb { background:var(--text-muted); border-radius:3px; }

  .message { 
    max-width:85%; 
    padding:8px 12px; 
    border-radius:8px; 
    position:relative; 
    margin-bottom:2px; 
    word-wrap:break-word; 
    line-height:1.4; 
    font-size:14px; 
    animation:fadeIn .3s ease;
    color:var(--text-primary);
    box-shadow:0 1px 2px var(--shadow);
  }
  @keyframes fadeIn { from{opacity:0;transform:translateY(10px);} to{opacity:1;transform:translateY(0);} }

  .msg-bot { 
    background:var(--bg-message-received); 
    align-self:flex-start; 
    border-top-left-radius:0; 
  }
  .msg-bot::before { 
    content:''; position:absolute; top:0; left:-8px; 
    width:8px; height:13px; background:var(--bg-message-received); 
    clip-path:polygon(100% 0,0 0,100% 100%); 
  }
  .msg-user { 
    background:var(--bg-message-sent); 
    align-self:flex-end; 
    border-top-right-radius:0; 
  }
  .msg-user::before { 
    content:''; position:absolute; top:0; right:-8px; 
    width:8px; height:13px; background:var(--bg-message-sent); 
    clip-path:polygon(0 0,100% 0,0 100%); 
  }

  .msg-meta { 
    float:right; display:flex; align-items:center; gap:3px; 
    margin-top:2px; margin-left:8px; position:relative; top:5px; 
    font-size:11px; color:var(--text-secondary); 
  }

  /* Question Timer Display */
  .question-timer {
    display:inline-block;
    background:var(--timer-bg);
    color:var(--timer-text);
    padding:2px 8px;
    border-radius:10px;
    font-size:11px;
    font-weight:bold;
    margin-left:6px;
    font-family:'Courier New',monospace;
  }

  /* Review Badge */
  .review-badge {
    display:inline-block;
    background:var(--skip);
    color:#fff;
    padding:2px 8px;
    border-radius:10px;
    font-size:11px;
    font-weight:bold;
    margin-right:6px;
  }

  /* Media */
  .media-container {
    margin: -4px -8px 8px -8px;
    border-radius: 6px;
    overflow: hidden;
  }
  .media-container img, .media-container video {
    width: 100%; max-height: 250px; display: block;
  }
  .media-container audio { width: 100%; margin-top: 4px; }
  .media-placeholder {
    width: 100%; height: 150px; background: var(--bg-quick-reply);
    display: flex; align-items: center; justify-content: center;
    color: var(--text-secondary); font-size: 40px;
  }

  /* Typing */
  .typing { 
    align-self:flex-start; background:var(--bg-message-received); 
    padding:12px 16px; border-radius:8px; border-top-left-radius:0; 
    display:flex; gap:4px; align-items:center;
    box-shadow:0 1px 2px var(--shadow);
  }
  .typing-dot { 
    width:8px; height:8px; background:var(--text-secondary); 
    border-radius:50%; animation:bounce 1.4s infinite; 
  }
  .typing-dot:nth-child(2){animation-delay:.2s;} 
  .typing-dot:nth-child(3){animation-delay:.4s;}
  @keyframes bounce { 0%,60%,100%{transform:translateY(0);opacity:.4;} 30%{transform:translateY(-6px);opacity:1;} }

  /* Input */
  .input-area { 
    background:var(--bg-header); 
    padding:8px 10px; 
    display:flex; 
    align-items:center; 
    gap:8px;
    border-top:1px solid var(--border-color);
  }
  .input-box { 
    flex:1; background:var(--bg-input); border-radius:8px; 
    padding:9px 14px; border:1px solid var(--border-color);
  }
  .input-box input { 
    width:100%; background:transparent; border:none; outline:none; 
    color:var(--text-primary); font-size:14px; 
  }
  .input-box input::placeholder { color:var(--text-secondary); }
  .send-btn { 
    width:42px; height:42px; border-radius:50%; 
    background:var(--accent); display:flex; 
    align-items:center; justify-content:center; 
    color:white; cursor:pointer; flex-shrink:0; border:none;
  }
  .send-btn:hover { background:var(--accent-hover); }

  /* Quick Replies */
  .quick-replies { 
    background:var(--bg-quick-reply); 
    padding:10px; 
    display:flex; 
    flex-wrap:wrap; 
    gap:8px; 
    justify-content:center; 
    border-top:1px solid var(--border-color);
  }
  .qr-btn { 
    background:var(--bg-message-sent); 
    color:var(--text-primary); 
    border:none; 
    padding:10px 16px; 
    border-radius:20px; 
    cursor:pointer; 
    font-size:14px; 
    transition:all .2s; 
    min-width:80px;
    box-shadow:0 1px 2px var(--shadow);
  }
  .qr-btn:hover { background:var(--accent); color:white; transform:scale(1.03); }
  .qr-btn:disabled { opacity:.5; cursor:not-allowed; }
  .qr-btn.option { 
    background:var(--bg-input); 
    text-align:left; 
    padding:10px 14px; 
    border-radius:8px; 
    flex:1 1 100%;
    border:1px solid var(--border-color);
  }
  .qr-btn.option:hover { background:var(--bg-message-sent); }
  .qr-btn.option.correct { background:var(--correct); color:white; }
  .qr-btn.option.wrong { background:var(--wrong); color:white; }
  
  /* Skip Button */
  .qr-btn.skip-btn {
    background:transparent;
    color:var(--skip);
    border:2px solid var(--skip);
    padding:8px 16px;
    font-weight:bold;
  }
  .qr-btn.skip-btn:hover {
    background:var(--skip);
    color:white;
  }

  /* Result */
  .result-card { 
    background:linear-gradient(135deg,var(--accent),var(--accent-hover)); 
    color:white; padding:20px; border-radius:12px; 
    align-self:center; max-width:90%; text-align:center; 
    animation:fadeIn .5s ease;
    box-shadow:0 4px 12px var(--shadow);
  }
  .result-card h2 { font-size:22px; margin-bottom:8px; }
  .result-card .score { font-size:48px; font-weight:bold; margin:10px 0; }
  .result-card .stats { 
    display:flex; justify-content:space-around; margin:15px 0;
    background:rgba(255,255,255,0.15); padding:10px; border-radius:8px;
  }
  .result-card .stat-item { text-align:center; }
  .result-card .stat-value { font-size:20px; font-weight:bold; }
  .result-card .stat-label { font-size:11px; opacity:0.9; }
  .result-card .motivation { font-size:14px; margin:10px 0; font-style:italic; }
  .result-card a { 
    display:inline-block; margin-top:12px; background:white; 
    color:var(--accent); padding:10px 20px; border-radius:20px; 
    text-decoration:none; font-weight:bold;
  }
  .result-card a:hover { transform:scale(1.05); }

  .hidden { display:none !important; }
</style>
</head>
<body>

<div class="phone-frame">
  <div class="chat-header">
    <div class="avatar">🎓</div>
    <div class="contact-info">
      <div class="contact-name">Quiz Edukasi Bot</div>
      <div class="contact-status" id="statusText">online</div>
    </div>
    <div class="header-icons">
      <span id="scoreDisplay">⭐ 0</span>
      <span class="timer-badge" id="timerBadge" style="display:none;">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2zm0 18c-4.4 0-8-3.6-8-8s3.6-8 8-8 8 3.6 8 8-3.6 8-8 8zm.5-13H11v6l5.2 3.2.8-1.3-4.5-2.7V7z"/></svg>
        <span id="totalTimer">00:00</span>
      </span>
      <span class="theme-toggle" id="themeToggle" title="Toggle Theme">
        <svg id="themeIcon" viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
          <path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58a.996.996 0 00-1.41 0 .996.996 0 000 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37a.996.996 0 00-1.41 0 .996.996 0 000 1.41l1.06 1.06c.39.39 1.03.39 1.41 0a.996.996 0 000-1.41l-1.06-1.06zm1.06-10.96a.996.996 0 000-1.41.996.996 0 00-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06zM7.05 18.36a.996.996 0 000-1.41.996.996 0 00-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06z"/>
        </svg>
      </span>
    </div>
  </div>

  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

  <div class="chat-area" id="chatArea"></div>

  <div class="input-area" id="inputArea">
    <div class="input-box">
      <input type="text" id="userInput" placeholder="Ketik pesan..." autocomplete="off">
    </div>
    <button class="send-btn" id="sendBtn">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
        <path d="M1.101 21.757L23.8 12.028 1.101 2.3l.011 7.912 13.623 1.816-13.623 1.817-.011 7.912z"/>
      </svg>
    </button>
  </div>

  <div class="quick-replies hidden" id="quickReplies"></div>
</div>

<script>
// ============ KONFIGURASI ============
const WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbxWFxZjjPYg8p_xabiqpb4vVq-_playWK0b-XYCvrfo4gzNiAqestysp1-Zu5ba_1h_/exec';

// ============ THEME ============
const themeToggle = document.getElementById('themeToggle');
const themeIcon = document.getElementById('themeIcon');

function getPreferredTheme() {
  const saved = localStorage.getItem('quizTheme');
  if (saved) return saved;
  return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
}

function setTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem('quizTheme', theme);
  updateThemeIcon(theme);
}

function updateThemeIcon(theme) {
  if (theme === 'dark') {
    themeIcon.innerHTML = '<path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 01-4.4 2.26 5.403 5.403 0 01-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"/>';
  } else {
    themeIcon.innerHTML = '<path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58a.996.996 0 00-1.41 0 .996.996 0 000 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37a.996.996 0 00-1.41 0 .996.996 0 000 1.41l1.06 1.06c.39.39 1.03.39 1.41 0a.996.996 0 000-1.41l-1.06-1.06zm1.06-10.96a.996.996 0 000-1.41.996.996 0 00-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06zM7.05 18.36a.996.996 0 000-1.41.996.996 0 00-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06z"/>';
  }
}

setTheme(getPreferredTheme());
themeToggle.addEventListener('click', () => {
  const current = document.documentElement.getAttribute('data-theme');
  setTheme(current === 'dark' ? 'light' : 'dark');
});
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
  if (!localStorage.getItem('quizTheme')) setTheme(e.matches ? 'dark' : 'light');
});

// ============ STATE ============
const state = {
  step: 'init',
  playerName: '',
  school: '',
  level: '',
  questions: [],
  currentIndex: 0,
  score: 0,
  answered: false,
  // NEW: Skip & Timer
  skippedQuestions: [],      // array of {originalIndex, timeSpent}
  currentQuestionStartTime: 0,
  totalTimeSpent: 0,         // total detik
  totalTimerInterval: null,  // interval untuk total timer
  isReviewMode: false,       // apakah sedang review soal skip
  reviewQueue: [],           // queue soal yang akan di-review
  answeredCorrectly: new Set(), // index soal yang sudah dijawab benar
};

const chatArea = document.getElementById('chatArea');
const quickReplies = document.getElementById('quickReplies');
const inputArea = document.getElementById('inputArea');
const userInput = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');
const progressFill = document.getElementById('progressFill');
const scoreDisplay = document.getElementById('scoreDisplay');
const statusText = document.getElementById('statusText');
const timerBadge = document.getElementById('timerBadge');
const totalTimerEl = document.getElementById('totalTimer');

// ============ UTILS ============
function getTime() {
  const n = new Date();
  return n.getHours().toString().padStart(2,'0') + ':' + n.getMinutes().toString().padStart(2,'0');
}

function scrollBottom() { chatArea.scrollTop = chatArea.scrollHeight; }

function escapeHtml(t) {
  const d = document.createElement('div');
  d.textContent = t;
  return d.innerHTML;
}

function formatTime(seconds) {
  const m = Math.floor(seconds / 60).toString().padStart(2, '0');
  const s = (seconds % 60).toString().padStart(2, '0');
  return `${m}:${s}`;
}

// ============ TOTAL TIMER ============
function startTotalTimer() {
  if (state.totalTimerInterval) clearInterval(state.totalTimerInterval);
  state.totalTimerInterval = setInterval(() => {
    state.totalTimeSpent++;
    totalTimerEl.textContent = formatTime(state.totalTimeSpent);
  }, 1000);
  timerBadge.style.display = 'flex';
}

function stopTotalTimer() {
  if (state.totalTimerInterval) {
    clearInterval(state.totalTimerInterval);
    state.totalTimerInterval = null;
  }
}

// ============ BOT MESSAGE ============
function addBotMessage(text, delay = 800) {
  return new Promise(resolve => {
    const typing = document.createElement('div');
    typing.className = 'typing';
    typing.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
    chatArea.appendChild(typing);
    scrollBottom();
    statusText.textContent = 'sedang mengetik...';

    setTimeout(() => {
      typing.remove();
      statusText.textContent = 'online';
      const msg = document.createElement('div');
      msg.className = 'message msg-bot';
      msg.innerHTML = `${text}<span class="msg-meta">${getTime()}</span>`;
      chatArea.appendChild(msg);
      scrollBottom();
      resolve();
    }, delay);
  });
}

function addUserMessage(text) {
  const msg = document.createElement('div');
  msg.className = 'message msg-user';
  msg.innerHTML = `${escapeHtml(text)}<span class="msg-meta">${getTime()}</span>`;
  chatArea.appendChild(msg);
  scrollBottom();
}

function showQuickReplies(options, type = 'button') {
  quickReplies.innerHTML = '';
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'qr-btn' + (type === 'option' ? ' option' : '') + (opt.className ? ' ' + opt.className : '');
    btn.innerHTML = opt.label;
    btn.onclick = () => {
      if (state.answered && type === 'option') return;
      quickReplies.querySelectorAll('button').forEach(b => b.disabled = true);
      opt.action(opt.value, btn);
    };
    quickReplies.appendChild(btn);
  });
  quickReplies.classList.remove('hidden');
  inputArea.classList.add('hidden');
}

function hideQuickReplies() {
  quickReplies.classList.add('hidden');
  inputArea.classList.remove('hidden');
}

function showTextInput(placeholder = 'Ketik pesan...') {
  userInput.placeholder = placeholder;
  userInput.value = '';
  hideQuickReplies();
  userInput.focus();
}

function updateProgress() {
  if (state.questions.length === 0) { progressFill.style.width = '0%'; return; }
  const pct = (state.currentIndex / state.questions.length) * 100;
  progressFill.style.width = pct + '%';
}

// ============ NETWORK ============
function fetchJSONP(url, callbackName) {
  return new Promise((resolve, reject) => {
    const cb = callbackName + '_' + Date.now();
    window[cb] = (data) => { resolve(data); delete window[cb]; script.remove(); };
    const script = document.createElement('script');
    script.src = url + (url.includes('?') ? '&' : '?') + 'callback=' + cb;
    script.onerror = () => { reject(new Error('Network error')); delete window[cb]; script.remove(); };
    document.body.appendChild(script);
  });
}

function fetchPost(url, data) {
  return fetch(url, {
    method: 'POST', mode: 'no-cors',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(data)
  });
}

// ============ MEDIA ============
function renderMedia(mediaUrl, mediaType) {
  if (!mediaUrl || mediaUrl.trim() === '') return '';
  const container = document.createElement('div');
  container.className = 'media-container';
  
  if (mediaType === 'image' || mediaUrl.match(/\.(jpg|jpeg|png|gif|webp)$/i)) {
    const img = document.createElement('img');
    img.src = mediaUrl;
    img.alt = 'Soal Image';
    img.onerror = () => { container.innerHTML = '<div class="media-placeholder">🖼️</div>'; };
    container.appendChild(img);
  } else if (mediaType === 'video' || mediaUrl.match(/\.(mp4|webm|ogg)$/i)) {
    const video = document.createElement('video');
    video.controls = true; video.src = mediaUrl;
    container.appendChild(video);
  } else if (mediaType === 'audio' || mediaUrl.match(/\.(mp3|wav|ogg|m4a)$/i)) {
    const audio = document.createElement('audio');
    audio.controls = true; audio.src = mediaUrl;
    container.appendChild(audio);
  } else if (mediaUrl.includes('youtube.com') || mediaUrl.includes('youtu.be')) {
    let videoId = '';
    if (mediaUrl.includes('v=')) videoId = mediaUrl.split('v=')[1]?.split('&')[0];
    else videoId = mediaUrl.split('/').pop();
    container.innerHTML = `<iframe width="100%" height="200" src="https://www.youtube.com/embed/${videoId}" frameborder="0" allowfullscreen></iframe>`;
  } else {
    container.innerHTML = '<div class="media-placeholder">🔗</div>';
  }
  return container.outerHTML;
}

// ============ QUIZ FLOW ============
async function startQuiz() {
  await addBotMessage('👋 Halo! Selamat datang di <b>Quiz Edukasi</b> 🎓');
  await addBotMessage('Sebelum mulai, aku mau kenalan dulu nih 😊');
  await addBotMessage('Siapa namamu?');
  state.step = 'askName';
  showTextInput('Ketik namamu...');
}

async function handleName(name) {
  state.playerName = name.trim();
  addUserMessage(state.playerName);
  await addBotMessage(`Salam kenal, <b>${escapeHtml(state.playerName)}</b>! 😄`);
  await addBotMessage('Sekarang pilih jenjang pendidikanmu:');
  state.step = 'askLevel';
  showQuickReplies([
    { label: '🏫 SD', value: 'SD', action: handleLevel },
    { label: '🏫 SMP', value: 'SMP', action: handleLevel }
  ]);
}

async function handleLevel(level) {
  state.level = level;
  addUserMessage(level);
  await addBotMessage(`Oke, jenjang <b>${level}</b> 👍`);
  await addBotMessage('Asal sekolahmu di mana?');
  state.step = 'askSchool';
  showTextInput('Nama sekolah...');
}

async function handleSchool(school) {
  state.school = school.trim();
  addUserMessage(state.school);
  await addBotMessage(`Keren! Sekolahmu di <b>${escapeHtml(state.school)}</b> 🏫`);
  await addBotMessage(`Kamu siap mengikuti games ini, <b>${escapeHtml(state.playerName)}</b>? 🎯`);
  state.step = 'confirm';
  showQuickReplies([
    { label: '✅ Siap!', value: 'yes', action: handleConfirm },
    { label: '❌ Belum', value: 'no', action: handleConfirm }
  ]);
}

async function handleConfirm(val) {
  addUserMessage(val === 'yes' ? 'Siap!' : 'Belum');
  if (val === 'no') {
    await addBotMessage('Yah 😢 Kalau sudah siap, refresh halaman ini ya!');
    return;
  }
  await addBotMessage('Mantap! 🔥 Tunggu sebentar, aku ambil soalnya dulu...');
  statusText.textContent = 'mengambil soal...';
  try {
    const data = await fetchJSONP(`${WEBAPP_URL}?action=getQuestions&level=${state.level}`, 'getQ');
    state.questions = data.questions || [];
    if (state.questions.length === 0) throw new Error('Soal kosong');
    await addBotMessage(`📝 Oke! Ada <b>${state.questions.length}</b> soal untukmu.`);
    await addBotMessage('💡 <b>Tips:</b> Kamu bisa <b>melewati</b> soal yang sulit dan kembali menjawabnya nanti. Tapi ingat, <b>waktu terus berjalan</b>! ⏱️');
    state.step = 'question';
    state.currentIndex = 0;
    state.score = 0;
    state.totalTimeSpent = 0;
    state.skippedQuestions = [];
    state.answeredCorrectly = new Set();
    state.isReviewMode = false;
    updateProgress();
    startTotalTimer();
    showQuestion();
  } catch (err) {
    console.error(err);
    await addBotMessage('⚠️ Gagal memuat soal. Periksa koneksi atau URL Web App.');
  }
}

// ============ SHOW QUESTION ============
async function showQuestion() {
  const q = state.questions[state.currentIndex];
  updateProgress();
  scoreDisplay.textContent = '⭐ ' + state.score;
  
  // Reset timer per soal
  state.currentQuestionStartTime = Date.now();
  state.answered = false;
  
  // Badge review jika di review mode
  let reviewBadge = '';
  if (state.isReviewMode) {
    reviewBadge = '<span class="review-badge">🔄 SOAL LEWATAN</span>';
  }
  
  let questionHtml = `${reviewBadge}<b>Soal ${state.currentIndex + 1} dari ${state.questions.length}</b><br><br>${escapeHtml(q.soal)}`;
  
  if (q.media) {
    questionHtml += renderMedia(q.media, q.mediaType || '');
  }
  
  await addBotMessage(questionHtml);
  
  // Tombol opsi + skip
  const options = [
    { label: 'A. ' + q.opsiA, value: 'A', action: handleAnswer },
    { label: 'B. ' + q.opsiB, value: 'B', action: handleAnswer },
    { label: 'C. ' + q.opsiC, value: 'C', action: handleAnswer },
    { label: 'D. ' + q.opsiD, value: 'D', action: handleAnswer },
    { label: '⏭️ Lewati Soal', value: 'skip', action: handleSkip, className: 'skip-btn' }
  ];
  showQuickReplies(options, 'option');
}

// ============ HANDLE ANSWER ============
async function handleAnswer(answer, btn) {
  if (state.answered) return;
  state.answered = true;
  
  // Hitung waktu soal ini
  const timeSpent = Math.floor((Date.now() - state.currentQuestionStartTime) / 1000);
  
  const q = state.questions[state.currentIndex];
  addUserAnswerBtn(answer, btn, q.jawaban);

  const isCorrect = answer === q.jawaban;
  if (isCorrect) {
    state.score += 10;
    state.answeredCorrectly.add(state.currentIndex);
    await addBotMessage(`✅ <b>Benar!</b> Hebat! 🎉 <span class="question-timer">⏱️ ${timeSpent}s</span>`);
  } else {
    await addBotMessage(`❌ <b>Kurang tepat.</b><br>Jawaban: <b>${q.jawaban}. ${escapeHtml(q['opsi'+q.jawaban])}</b> <span class="question-timer">⏱️ ${timeSpent}s</span>`);
  }
  scoreDisplay.textContent = '⭐ ' + state.score;

  setTimeout(async () => {
    state.currentIndex++;
    if (state.currentIndex < state.questions.length) {
      showQuestion();
    } else {
      // Cek apakah ada soal yang di-skip
      checkSkippedQuestions();
    }
  }, 1800);
}

// ============ HANDLE SKIP ============
async function handleSkip(value, btn) {
  if (state.answered) return;
  state.answered = true;
  
  const timeSpent = Math.floor((Date.now() - state.currentQuestionStartTime) / 1000);
  
  // Simpan ke daftar skip
  state.skippedQuestions.push({
    originalIndex: state.currentIndex,
    timeSpent: timeSpent
  });
  
  addUserMessage('⏭️ Lewati soal ini');
  await addBotMessage(`⏭️ Oke, soal ini dilewati. <span class="question-timer">⏱️ ${timeSpent}s</span>`);
  
  setTimeout(() => {
    state.currentIndex++;
    if (state.currentIndex < state.questions.length) {
      showQuestion();
    } else {
      checkSkippedQuestions();
    }
  }, 1000);
}

function addUserAnswerBtn(answer, btn, correct) {
  if (answer === correct) btn.classList.add('correct');
  else {
    btn.classList.add('wrong');
    quickReplies.querySelectorAll('button').forEach(b => {
      if (b.textContent.startsWith(correct + '.')) b.classList.add('correct');
    });
  }
  addUserMessage(btn.textContent);
}

// ============ CHECK SKIPPED ============
async function checkSkippedQuestions() {
  if (state.skippedQuestions.length === 0) {
    await finishQuiz();
    return;
  }
  
  const count = state.skippedQuestions.length;
  await addBotMessage(`🔄 Kamu melewatkan <b>${count} soal</b>. Mau kembali menjawabnya?`);
  await addBotMessage('💡 Jawaban benar akan tetap menambah skor, tapi waktu terus berjalan!');
  
  showQuickReplies([
    { label: '✅ Ya, Jawab Sekarang', value: 'review', action: handleReviewChoice },
    { label: '🏁 Selesai Saja', value: 'finish', action: handleReviewChoice }
  ]);
}

async function handleReviewChoice(choice) {
  addUserMessage(choice === 'review' ? 'Ya, jawab sekarang' : 'Selesai saja');
  
  if (choice === 'finish') {
    await finishQuiz();
  } else {
    // Setup review mode
    state.isReviewMode = true;
    state.reviewQueue = state.skippedQuestions.map(sq => sq.originalIndex);
    state.skippedQuestions = []; // reset untuk track skip baru (jika ada)
    await addBotMessage(`🔥 Oke! Ada <b>${state.reviewQueue.length}</b> soal lewatan. Ayo kita selesaikan! 💪`);
    showNextReviewQuestion();
  }
}

function showNextReviewQuestion() {
  if (state.reviewQueue.length === 0) {
    finishQuiz();
    return;
  }
  state.currentIndex = state.reviewQueue.shift();
  showQuestion();
}

// ============ FINISH QUIZ ============
async function finishQuiz() {
  stopTotalTimer();
  updateProgress();
  progressFill.style.width = '100%';
  
  const total = state.questions.length * 10;
  const pct = Math.round((state.score / total) * 100);
  const timeFormatted = formatTime(state.totalTimeSpent);
  const correctCount = state.answeredCorrectly.size;

  let motivasi = '';
  if (pct === 100) motivasi = '🏆 SEMPURNA! Kamu luar biasa! Pertahankan prestasimu!';
  else if (pct >= 80) motivasi = '🌟 Keren banget! Kamu hampir sempurna!';
  else if (pct >= 60) motivasi = '👍 Bagus! Terus belajar untuk hasil yang lebih baik!';
  else if (pct >= 40) motivasi = '💪 Lumayan! Jangan menyerah, terus berlatih ya!';
  else motivasi = '📚 Ayo semangat! Belajar lagi dan coba lagi ya!';

  await addBotMessage('🎉 <b>Quiz Selesai!</b>');

  const card = document.createElement('div');
  card.className = 'result-card';
  card.innerHTML = `
    <h2>🏆 Hasil Quiz</h2>
    <div style="font-size:14px;opacity:.9">Peserta: <b>${escapeHtml(state.playerName)}</b></div>
    <div style="font-size:13px;opacity:.8">${escapeHtml(state.school)} • ${state.level}</div>
    <div class="score">${state.score}/${total}</div>
    <div class="stats">
      <div class="stat-item">
        <div class="stat-value">${pct}%</div>
        <div class="stat-label">Nilai</div>
      </div>
      <div class="stat-item">
        <div class="stat-value">${correctCount}/${state.questions.length}</div>
        <div class="stat-label">Benar</div>
      </div>
      <div class="stat-item">
        <div class="stat-value">${timeFormatted}</div>
        <div class="stat-label">Waktu</div>
      </div>
    </div>
    <div class="motivation">"${motivasi}"</div>
    <a href="leaderboard.html">🏅 Lihat Leaderboard</a>
  `;
  chatArea.appendChild(card);
  scrollBottom();

  try {
    await fetchPost(WEBAPP_URL, {
      action: 'submitScore',
      nama: state.playerName,
      sekolah: state.school,
      level: state.level,
      score: state.score,
      total: total,
      persen: pct,
      waktu: state.totalTimeSpent, // dalam detik
      waktuFormatted: timeFormatted,
      benar: correctCount,
      waktuISO: new Date().toISOString()
    });
    await addBotMessage('✅ Nilaimu sudah tercatat di leaderboard!');
  } catch (e) {
    console.error(e);
  }

  await addBotMessage('🔄 Mau main lagi? Refresh halaman ini ya!');
  quickReplies.classList.add('hidden');
}

// ============ TEXT INPUT ============
function handleTextSubmit() {
  const val = userInput.value.trim();
  if (!val) return;
  userInput.value = '';
  if (state.step === 'askName') { hideQuickReplies(); handleName(val); }
  else if (state.step === 'askSchool') { hideQuickReplies(); handleSchool(val); }
}

sendBtn.addEventListener('click', handleTextSubmit);
userInput.addEventListener('keypress', e => { if (e.key === 'Enter') handleTextSubmit(); });

window.addEventListener('load', () => { setTimeout(startQuiz, 500); });
</script>
